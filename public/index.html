<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formularios</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --text: #172033;
      --muted: #657086;
      --border: #dce4ef;
      --primary: #0b63ce;
      --surface: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(100%, 720px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(17, 36, 64, 0.10);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
    }

    nav {
      display: grid;
      gap: 12px;
    }

    a {
      display: block;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover,
    a:focus-visible {
      border-color: var(--primary);
      outline: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Formularios disponibles</h1>
    <p>Selecciona el formulario que quieres abrir.</p>
    <nav aria-label="Formularios">
      <a href="/formulario.html">Solicitud de gestion e-commerce</a>
      <a href="/nuevosdistribuidores.html">Formulario distribuidores ImportLED</a>
    </nav>
  </main>
</body>
</html>
